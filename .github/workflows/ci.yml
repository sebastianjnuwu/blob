name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.9'
          cache: true

      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            gofmt -d .
            exit 1
          fi

      - run: go vet ./...

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.9'
          cache: true

      - run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.9'
          cache: true

      - name: Build binary with version
        env:
          CGO_ENABLED: 0
        run: |
          VERSION=$(date +"%Y-%m-%d_%H:%M")
          go build -trimpath -ldflags="-s -w -X main.Version=$VERSION" -o blob
          echo "Built version: $VERSION"
          ls -lh blob

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login GHCR
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u sebastianjnuwu --password-stdin

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/sebastianjnuwu/blob:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max